<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Contador Monster 😈</title>

<style>
body {
    margin: 0;
    height: 100vh;

    display: flex;
    justify-content: center;
    align-items: center;

    color: #c084fc;
    font-family: Arial, sans-serif;
    text-align: center;

    background: linear-gradient(45deg, #000000, #1a0025, #7c3aed);
    background-size: 400% 400%;
    animation: gradientMove 10s ease infinite;

    overflow: hidden;
}

/* fundo animado */
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    position: relative;
    z-index: 2;
    width: 90%;
    max-width: 500px;
}

/* título */
h1 {
    font-size: 42px;
    text-shadow: 0 0 15px #a855f7;
}

/* contador */
#contador {
    font-size: 32px;
    margin: 20px auto;
    padding: 15px 25px;
    border: 3px solid #a855f7;
    display: inline-block;
    border-radius: 12px;
    box-shadow: 0 0 25px #a855f7;
    animation: glow 1.5s infinite alternate;
}

/* botão */
#botao {
    margin-top: 25px;
    padding: 14px 30px;
    font-size: 18px;
    background: black;
    color: #c084fc;
    border: 3px solid #a855f7;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 0 15px #a855f7;
    transition: all 0.3s;
}

#botao:hover {
    background: #a855f7;
    color: black;
    transform: scale(1.1);
}

#botao:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

/* mensagem */
#mensagem {
    margin-top: 15px;
    font-size: 20px;
    min-height: 30px;
}

/* glow */
@keyframes glow {
    0% { box-shadow: 0 0 10px #a855f7; }
    100% { box-shadow: 0 0 40px #a855f7; }
}

/* partículas */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1;
}

/* mobile */
@media (max-width: 600px) {
    h1 { font-size: 28px; }
    #contador { font-size: 24px; }
    #botao { font-size: 16px; padding: 12px 20px; }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="container">
    <h1>⏳ CONTAGEM PRO MONSTER 😈</h1>
    <div id="contador"></div>

    <button onclick="verificarMonster()" id="botao">
        Posso pegar o Monster agora? 🔥
    </button>

    <div id="mensagem"></div>
</div>

<script>
const contador = document.getElementById("contador");
const botao = document.getElementById("botao");
const mensagem = document.getElementById("mensagem");

const alvo = new Date("2026-04-11T13:00:00").getTime();

// contador
function atualizarContador() {
    const agora = new Date().getTime();
    const diferenca = alvo - agora;

    if (diferenca <= 0) {
        contador.innerHTML = "🔥 MONSTER LIBERADO AGORA! 🔥";
        botao.disabled = true;
        return;
    }

    const dias = Math.floor(diferenca / (1000 * 60 * 60 * 24));
    const horas = Math.floor((diferenca / (1000 * 60 * 60)) % 24);
    const minutos = Math.floor((diferenca / (1000 * 60)) % 60);
    const segundos = Math.floor((diferenca / 1000) % 60);

    contador.innerHTML = `${dias}d ${horas}h ${minutos}m ${segundos}s`;
}

// botão sem alert
function verificarMonster() {
    const agora = new Date().getTime();

    if (agora >= alvo) {
        mensagem.innerHTML = "🔥 SIM! PEGA O MONSTER AGORA 😈";
        mensagem.style.color = "#a855f7";
    } else {
        mensagem.innerHTML = "❌ Ainda não, calma aí doido ☠️";
        mensagem.style.color = "#f87171";
    }

    setTimeout(() => {
        mensagem.innerHTML = "";
    }, 3000);
}

setInterval(atualizarContador, 1000);
atualizarContador();

// partículas
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resizeCanvas();

let particles = [];

for (let i = 0; i < 120; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 3,
        speedY: Math.random() * 1.5 + 0.5
    });
}

function drawParticles() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = "#a855f7";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        p.y -= p.speedY;

        if (p.y < 0) {
            p.y = canvas.height;
            p.x = Math.random() * canvas.width;
        }
    });

    requestAnimationFrame(drawParticles);
}

window.addEventListener("resize", resizeCanvas);
drawParticles();
</script>

</body>
</html>
